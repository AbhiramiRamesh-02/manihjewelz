<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Manih Jewelz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    .reset-card {
      max-width: 420px;
      margin: 6rem auto;
      padding: 2.5rem;
      background: var(--white-pure);
      border: 1px solid var(--border-rose);
      box-shadow: var(--shadow-subtle);
    }
    .reset-title {
      font-family: var(--font-display);
      color: var(--bg-maroon);
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .reset-subtitle {
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 2rem;
      line-height: 1.5;
    }
    .message-box {
      padding: 0.8rem;
      font-size: 0.75rem;
      margin-bottom: 1.5rem;
      border-radius: 4px;
      line-height: 1.4;
    }
    .message-box.error {
      color: #d9534f;
      background-color: #fdf7f7;
      border: 1px solid #d9534f;
    }
    .message-box.success {
      color: #3c763d;
      background-color: #dff0d8;
      border: 1px solid #d6e9c6;
    }
  </style>
</head>
<body style="background-color: var(--cream-ivory);">

  <div class="reset-card">
    <div style="text-align: center; margin-bottom: 1.5rem;">
      <a href="index.html">
        <img src="assets/logo.png" alt="Manih Jewelz Logo" style="height: 50px; object-fit: contain;">
      </a>
    </div>
    
    <h2 class="reset-title">Secure Reset</h2>
    <p class="reset-subtitle">Enter your new secure password below to regain account access.</p>

    <div id="error-box" class="message-box error hidden"></div>
    <div id="success-box" class="message-box success hidden"></div>

    <form id="reset-password-form">
      <div class="form-group" style="margin-bottom: 1rem;">
        <label for="new-password" style="font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--black); margin-bottom: 0.4rem; display: block;">New Password</label>
        <input type="password" id="new-password" placeholder="Minimum 6 characters" required style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-rose); font-family: var(--font-body); font-size: 0.8rem;">
      </div>
      
      <div class="form-group" style="margin-bottom: 2rem;">
        <label for="confirm-password" style="font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--black); margin-bottom: 0.4rem; display: block;">Confirm New Password</label>
        <input type="password" id="confirm-password" placeholder="Re-enter password" required style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-rose); font-family: var(--font-body); font-size: 0.8rem;">
      </div>

      <button type="submit" class="btn btn-primary btn-block" style="padding: 0.8rem; height: 48px;">Save Password</button>
    </form>
    
    <div id="back-to-site-link" class="hidden" style="text-align: center; margin-top: 1.5rem;">
      <a href="index.html" class="btn btn-secondary" style="display: inline-block; width: 100%; text-decoration: none; padding: 0.8rem 0;">Return to Storefront</a>
    </div>
  </div>

  <script>
    // Simple environment base URL resolution
    const API_BASE = window.location.origin;

    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      
      const form = document.getElementById('reset-password-form');
      const errorBox = document.getElementById('error-box');
      const successBox = document.getElementById('success-box');
      const newPasswordInput = document.getElementById('new-password');
      const confirmPasswordInput = document.getElementById('confirm-password');
      const backToSiteLink = document.getElementById('back-to-site-link');

      if (!token) {
        showError("Invalid or missing password reset token. Please request a new link from the storefront account drawer.");
        form.style.display = 'none';
        return;
      }

      function showError(msg) {
        errorBox.textContent = msg;
        errorBox.classList.remove('hidden');
        successBox.classList.add('hidden');
      }

      function showSuccess(msg) {
        successBox.textContent = msg;
        successBox.classList.remove('hidden');
        errorBox.classList.add('hidden');
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const password = newPasswordInput.value;
        const confirm = confirmPasswordInput.value;

        if (password.length < 6) {
          showError("Password must be at least 6 characters in length.");
          return;
        }

        if (password !== confirm) {
          showError("Passwords do not match. Please verify both inputs.");
          return;
        }

        try {
          const response = await fetch(`${API_BASE}/api/customer/reset-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, password })
          });

          const data = await response.json();
          if (!response.ok) throw new Error(data.error || "Failed to reset password.");

          showSuccess("Success! Your password has been updated.");
          form.style.display = 'none';
          backToSiteLink.classList.remove('hidden');
        } catch (err) {
          showError(err.message);
        }
      });
    });
  </script>
</body>
</html>
