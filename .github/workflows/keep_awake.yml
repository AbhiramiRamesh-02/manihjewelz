name: Keep Render App Awake

on:
  schedule:
    # Runs every 14 minutes (Render free tier spins down after 15 mins of inactivity)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Service
        run: |
          # Replace the URL below with your actual Render app URL
          # Example: https://manihjewelz.onrender.com/health
          curl -I -s -f "https://manihjewelz.onrender.com/health" || echo "Ping failed or server is booting up"
